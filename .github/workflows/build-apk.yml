name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Build release APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon
      - name: Prepare install package
        run: cp app/build/outputs/apk/release/app-release.apk mood.apk
      - uses: actions/upload-artifact@v4
        with:
          name: mood-apk
          path: mood.apk
          if-no-files-found: error
      - name: Publish stable download link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest mood.apk --clobber
          else
            gh release create latest mood.apk \
              --target "$GITHUB_SHA" \
              --title "Mood latest" \
              --notes "Mood Android desktop widget APK."
          fi
